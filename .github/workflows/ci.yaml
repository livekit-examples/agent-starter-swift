name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macOS"
          - platform: "iOS Simulator,name=iPhone 17 Pro,OS=26.4"
          - platform: "visionOS Simulator,name=Apple Vision Pro,OS=26.4"

    runs-on: macos-26
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 26.4

      - name: Xcode Version
        run: xcodebuild -version

      - name: Swift Version
        run: xcrun swift --version

      - name: Setup .env
        run: cat VoiceAgent/.env.example.xcconfig > VoiceAgent/.env.xcconfig

      - name: Build
        run: |
          set -o pipefail && xcodebuild build \
            -scheme VoiceAgent \
            -destination 'platform=${{ matrix.platform }}' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY= | xcbeautify --renderer github-actions

  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
      - name: SwiftFormat Lint
        if: always()
        run: swiftformat --lint . --reporter github-actions-log
        # Comes pre-installed on macOS runners
