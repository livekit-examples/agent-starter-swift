version: "3"

vars:
  env_file: "VoiceAgent/.env.xcconfig"
  env_example: "VoiceAgent/.env.example.xcconfig"

tasks:
  post_create:
    desc: "Runs after this template is instantiated as a Sandbox or Bootstrap"
    cmds:
      - echo "Your Swift Voice Agent is ready to go!"
      - echo "To give it a try, open the VoiceAgent.xcodeproj file in Xcode and run the app."
      - echo "For more help view your project's README.md file or join our Discourse community at https://community.livekit.io."
